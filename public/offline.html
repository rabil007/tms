<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#0f172a" />
        <title>Offline</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: #0f172a;
                color: #f8fafc;
                text-align: center;
            }

            img {
                width: 4rem;
                height: auto;
                margin-bottom: 1.5rem;
            }

            h1 {
                margin: 0 0 0.5rem;
                font-size: 1.25rem;
                font-weight: 600;
            }

            p {
                margin: 0;
                color: #94a3b8;
                font-size: 0.9375rem;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <div>
            <img src="/logo.png" alt="" />
            <h1>You&apos;re offline</h1>
            <p>Reconnect to load the latest schedules and updates.</p>
        </div>
    </body>
</html>
